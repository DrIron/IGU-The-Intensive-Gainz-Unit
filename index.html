<!doctype html>
<html lang="en" class="dark">
  <head>
    <!-- Theme: apply the persisted choice before first paint to avoid a flash of the wrong theme.
         Default is dark (the <html> tag already carries `dark`); only an explicit "light" opts out. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("igu_theme");
          document.documentElement.classList.toggle("dark", t !== "light");
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Intensive Gainz Unit Coaching</title>
    <meta name="description" content="Evidence-based online coaching, team programs, and performance tracking for serious lifters. Powered by IGU." data-rh="true">
    <meta name="author" content="Intensive Gainz Unit" />

    <!-- Google Fonts: Geist (body), Bebas Neue (display), JetBrains Mono (mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Hero LCP image preload -->
    <link rel="preload" as="image" href="/gym-hero-bg.jpg" fetchpriority="high">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"></noscript>

    <!-- Open Graph / Social. data-rh="true" hands these to react-helmet-async so
         per-page <SEOHead> (e.g. /coaches/:slug) REPLACES them in the DOM instead
         of duplicating (helmet only manages tags carrying data-rh). The static
         values remain the no-JS / crawler default. -->
    <meta property="og:type" content="website" data-rh="true" />
    <meta property="og:url" content="https://theigu.com" data-rh="true" />
    <meta property="og:title" content="Intensive Gainz Unit | Coaching for Serious Lifters" data-rh="true" />
    <meta property="og:description" content="Evidence-based online coaching, team programs, and performance tracking for serious lifters. Powered by IGU." data-rh="true" />
    <meta property="og:image" content="https://theigu.com/og-image.png" data-rh="true" />
    <meta property="og:image:width" content="2400" data-rh="true" />
    <meta property="og:image:height" content="1260" data-rh="true" />
    <meta property="og:image:alt" content="Intensive Gainz Unit (IGU)" data-rh="true" />
    <meta property="og:locale" content="en_US" data-rh="true" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@theigu" />
    <meta name="twitter:title" content="Intensive Gainz Unit | Coaching for Serious Lifters">
    <meta name="twitter:description" content="Evidence-based online coaching, team programs, and performance tracking for serious lifters. Powered by IGU.">
    <meta name="twitter:image" content="https://theigu.com/og-image.png">

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Intensive Gainz Unit",
      "alternateName": "IGU",
      "url": "https://theigu.com",
      "logo": "https://theigu.com/android-chrome-192x192.png",
      "image": "https://theigu.com/og-image.png",
      "description": "Evidence-based online coaching, team programs, and performance tracking for serious lifters.",
      "areaServed": { "@type": "Country", "name": "Kuwait" },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@theigu.com",
        "contactType": "customer support",
        "areaServed": "KW",
        "availableLanguage": ["en", "ar"]
      }
    }
    </script>
    <!-- Structured data: ProfessionalService (Kuwait) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Intensive Gainz Unit",
      "url": "https://theigu.com",
      "image": "https://theigu.com/og-image.png",
      "description": "Online and in-person fitness coaching, team programs, nutrition guidance, and performance tracking.",
      "areaServed": { "@type": "Country", "name": "Kuwait" },
      "address": { "@type": "PostalAddress", "addressCountry": "KW" }
    }
    </script>

    <!-- PWA -->
    <meta name="theme-color" content="#09090B" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IGU" />

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" href="/favicon.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">

    <!-- iOS Splash Screens (dark background to match app theme) -->
    <link rel="apple-touch-startup-image"
          media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
          href="/apple-touch-icon.png">
    <link rel="apple-touch-startup-image"
          media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
          href="/apple-touch-icon.png">
    <link rel="apple-touch-startup-image"
          media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
          href="/apple-touch-icon.png">
    <link rel="apple-touch-startup-image"
          media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
          href="/apple-touch-icon.png">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
